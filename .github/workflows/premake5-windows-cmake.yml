name: premake5-windows-cmake

on:
  workflow_dispatch:
  push:
    paths:
      - 'projects/project-*/**'
      - '.github/workflows/premake5-windows-cmake.yml'
      - '!**/*.md'
      - '!projects/**/unsupported_by_*'
      - '!**/premake4.lua'
      - 'projects/**/unsupported_by_cmake'
      - 'projects/**/unsupported_by_cmake_windows'
      - 'projects/**/unsupported_by_premake5_cmake'
      - 'submodules/premake-cmake'

  pull_request:
    paths:
      - 'projects/project-*/**'
      - '.github/workflows/premake5-windows-cmake.yml'
      - '!**/*.md'
      - '!projects/**/unsupported_by_*'
      - '!**/premake4.lua'
      - 'projects/**/unsupported_by_cmake'
      - 'projects/**/unsupported_by_cmake_windows'
      - 'projects/**/unsupported_by_premake5_cmake'
      - 'submodules/premake-cmake'

jobs:
  windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: checkout premake5
      uses: actions/checkout@v4
      with:
          repository: premake/premake-core
          path: premake-build

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build premake5
      run: |
        $vcvarall_path = vswhere -find VC\Auxiliary\Build\vcvarsall.bat
        cmd.exe /c "call ""$vcvarall_path"" x86_amd64 && cd premake-build && nmake -f Bootstrap.mak MSDEV=vs2019 windows-msbuild PLATFORM=Win32 CONFIG=release && cp bin/release/premake5.exe ../"

    - name: cmake --version
      run: cmake --version

    - name: add premake cmake module
      run: |
        echo "require 'submodules/premake-cmake/cmake'" >> premake-system.lua

    - name: test projects
      run: PATH=$PATH:`pwd` python3 ./test_projects.py premake5 projects cmake
      shell: bash
