name: premake5-windows-msvc-2026

on:
  workflow_call:
    inputs:
      premake-repo:
        default: 'premake/premake-core'
        type: string
      premake-ref:
        default: ''
        type: string
  workflow_dispatch:
    inputs:
      premake-repo:
        default: 'premake/premake-core'
        type: string
      premake-ref:
        default: ''
        type: string
  push:
    paths:
      - 'projects/**'
      - 'projects-C#/**'
      - '.github/workflows/premake5-windows-msvc-2026.yml'
      - '.github/actions/install-premake5/action.yml'
      - '!**/*.md'
      - '!projects/**/unsupported_by_*'
      - '!**/premake4.lua'
      - 'projects/**/unsupported_by_vs2026*'
      - 'projects/**/unsupported_by_premake5_vs2026'

  pull_request:
    paths:
      - 'projects/**'
      - 'projects-C#/**'
      - '.github/workflows/premake5-windows-msvc-2026.yml'
      - '.github/actions/install-premake5/action.yml'
      - '!**/*.md'
      - '!projects/**/unsupported_by_*'
      - '!**/premake4.lua'
      - 'projects/**/unsupported_by_vs2026*'
      - 'projects/**/unsupported_by_premake5_vs2026'

jobs:
  windows:
    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: install premake5
      if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
      uses: ./.github/actions/install-premake5
      with:
          repository: premake/premake-core

    - name: install premake5
      if: ${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' }}
      uses: ./.github/actions/install-premake5
      with:
          repository: ${{ inputs.premake-repo }}
          ref: ${{ inputs.premake-ref }}

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: test projects (default=msc)
      run: |
        #"C:\Program Files (x86)\Microsoft Visual Studio\2026\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x86_amd64
        python3 ./test_projects.py premake5 projects vs2026
      shell: bash

    - name: test projects (clang)
      run: |
        python3 ./test_projects.py premake5 projects vs2026 --cc=clang
      shell: bash

    - name: test projects-C# (default)
      run: python3 ./test_projects.py premake5 projects-C# vs2026
      shell: bash
